<!DOCTYPE html>
<html>
<head>
  <title>Web Wisnu 🔥</title>

  <style>
  .popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
  }

  .popup-content {
    background: #222;
    color: white;
    padding: 20px;
    margin: 100px auto;
    width: 80%;
    max-width: 300px;
    border-radius: 15px;
    text-align: center;
  }
  </style>

</head>

<body>
<div class="navbar">
  <a href="#">Home</a>
  <a href="tentang.html">Tentang</a>

</div>
<body>

<h1>Website Wisnu 🚀</h1>

<button onclick="bukaPopup()">Buka Popup 🚀</button>

<img src="https://picsum.photos/200" style="border-radius:15px; margin-top:20px;">

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <h2>Halo Wisnu 😎</h2>
    <p>Ini popup keren bro 🔥</p>
    <button onclick="tutupPopup()">Tutup</button>
  </div>
</div>

<script>
function bukaPopup() {
  document.getElementById("popup").style.display = "block";
}

function tutupPopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
